# Host nginx config for StaffEra (place alongside your other site configs).
# 1. Copy to /etc/nginx/sites-available/staffera.conf
# 2. Replace staffera.example.com domains and SSL certificate paths
# 3. Ensure STAFFERA_*_PORT in .env match the upstream ports below
# 4. sudo ln -s /etc/nginx/sites-available/staffera.conf /etc/nginx/sites-enabled/
# 5. sudo nginx -t && sudo systemctl reload nginx
#
# Obtain certificates (first time):
#   sudo certbot certonly --nginx -d staffera.example.com -d agent.staffera.example.com -d api.staffera.example.com

upstream staffera_api {
    server 127.0.0.1:15000;
    keepalive 32;
}

upstream staffera_website {
    server 127.0.0.1:15001;
    keepalive 16;
}

upstream staffera_agent {
    server 127.0.0.1:15002;
    keepalive 16;
}

# --- Marketing website ---
server {
    listen 80;
    listen [::]:80;
    server_name staffera.example.com www.staffera.example.com;
    return 301 https://staffera.example.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staffera.example.com www.staffera.example.com;

    ssl_certificate     /etc/letsencrypt/live/staffera.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staffera.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = www.staffera.example.com) {
        return 301 https://staffera.example.com$request_uri;
    }

    client_max_body_size 10m;

    location / {
        proxy_pass http://staffera_website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Agent onboarding portal ---
server {
    listen 80;
    listen [::]:80;
    server_name agent.staffera.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name agent.staffera.example.com;

    ssl_certificate     /etc/letsencrypt/live/staffera.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staffera.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://staffera_agent;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Backend API + uploaded files ---
server {
    listen 80;
    listen [::]:80;
    server_name api.staffera.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.staffera.example.com;

    ssl_certificate     /etc/letsencrypt/live/staffera.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staffera.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location /uploads/ {
        proxy_pass http://staffera_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://staffera_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
