# Host nginx config for BabyCare (place alongside your other site configs).
# 1. Copy to /etc/nginx/sites-available/childcare.conf
# 2. Ensure CHILDCARE_*_PORT in .env match the upstream ports below
# 3. sudo ln -s /etc/nginx/sites-available/childcare.conf /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx
#
# Obtain certificates (first time):
#   sudo certbot certonly --nginx -d reantalai.com -d www.reantalai.com -d baby.reantalai.com -d babyapi.reantalai.com
# If certbot uses a different live folder name, adjust ssl_certificate paths below.

upstream childcare_api {
    server 127.0.0.1:15000;
    keepalive 32;
}

upstream childcare_website {
    server 127.0.0.1:15001;
    keepalive 16;
}

upstream childcare_coordinator {
    server 127.0.0.1:15002;
    keepalive 16;
}

# --- Marketing website (optional — enable when reantalai.com DNS points to this VPS) ---
server {
    listen 80;
    listen [::]:80;
    server_name reantalai.com www.reantalai.com;
    return 301 https://reantalai.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name reantalai.com www.reantalai.com;

    ssl_certificate     /etc/letsencrypt/live/reantalai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reantalai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = www.reantalai.com) {
        return 301 https://reantalai.com$request_uri;
    }

    client_max_body_size 10m;

    location / {
        proxy_pass http://childcare_website;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Coordinator onboarding portal ---
server {
    listen 80;
    listen [::]:80;
    server_name baby.reantalai.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name baby.reantalai.com;

    ssl_certificate     /etc/letsencrypt/live/reantalai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reantalai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://childcare_coordinator;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Backend API + uploaded files ---
server {
    listen 80;
    listen [::]:80;
    server_name babyapi.reantalai.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name babyapi.reantalai.com;

    ssl_certificate     /etc/letsencrypt/live/reantalai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reantalai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location /uploads/ {
        proxy_pass http://childcare_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://childcare_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
